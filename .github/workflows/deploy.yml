name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t cicd-app:test .

      - name: Start Container
        run: |
          docker run -d -p 3000:3000 --name test-container cicd-app:test

      - name: Wait For Application
        run: |
          sleep 10

      - name: Health Check
        run: |
          curl --fail http://localhost:3000/health

      - name: Cleanup
        if: always()
        run: |
          docker stop test-container
          docker rm test-container