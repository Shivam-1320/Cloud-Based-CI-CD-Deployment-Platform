services:

  app:

    build: .

    container_name: cicd-app

    restart: unless-stopped

  nginx:

    image: nginx:latest

    container_name: cicd-nginx

    ports:
      - "8080:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    restart: unless-stopped